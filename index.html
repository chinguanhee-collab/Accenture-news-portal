<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEWSNOW Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <nav class="bg-black text-white p-4 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <h1 class="text-3xl font-extrabold text-red-600 tracking-tighter">NEWS<span class="text-white">NOW</span></h1>
            <ul class="flex space-x-6 text-sm font-semibold uppercase hidden md:flex">
		<li class="hover:text-red-500 cursor-pointer">All News</li>
                <li class="hover:text-red-500 cursor-pointer">Singapore</li>
                <li class="hover:text-red-500 cursor-pointer">Asia</li>
                <li class="hover:text-red-500 cursor-pointer">World</li>
                <li class="hover:text-red-500 cursor-pointer">Business</li>
            </ul>
	    <div class="hidden md:flex items-center ml-6">
            <input type="text" id="search-bar" placeholder="Search news..." class="px-3 py-1 rounded text-gray-900 text-sm focus:outline-none focus:ring-2 focus:ring-red-600">
        </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 mt-6">
        <section class="mb-12 border-b-4 border-red-600 pb-8">
            <div class="relative w-full h-96 bg-gray-300 mb-4">
                <img src="https://images.unsplash.com/photo-1495020689067-958852a7765e?w=1200&q=80" alt="Breaking News" class="w-full h-full object-cover">
                <div class="absolute top-0 left-0 bg-red-600 text-white font-bold px-4 py-1 uppercase text-sm">Breaking</div>
            </div>
            <h2 class="text-4xl font-extrabold mb-2">Government Announces Comprehensive Budget Plan for 2027</h2>
            <p class="text-xl text-gray-600">Major subsidies aimed at healthcare, housing, and technology sector growth to combat rising global inflation.</p>
        </section>

        <h3 class="text-2xl font-bold mb-6 border-l-4 border-red-600 pl-3">Latest Stories</h3>
        <section id="news-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </section>
    </main>
    


    <div id="article-modal" class="fixed inset-0 bg-black bg-opacity-75 hidden z-[100] flex items-center justify-center p-4">
        <div class="bg-white max-w-3xl w-full max-h-[90vh] overflow-y-auto rounded-lg shadow-2xl relative">
            <button id="close-modal" class="absolute top-4 right-4 text-gray-800 hover:text-red-600 font-bold text-3xl">&times;</button>
            
            <img id="modal-image" src="" alt="" class="w-full h-64 object-cover">
            <div class="p-8">
                <span id="modal-category" class="text-red-600 text-sm font-bold uppercase mb-2 block"></span>
                <h2 id="modal-title" class="text-3xl font-extrabold mb-4"></h2>
                <span id="modal-date" class="text-gray-500 text-sm mb-6 block"></span>
                <p id="modal-content" class="text-gray-800 text-lg leading-relaxed"></p>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
